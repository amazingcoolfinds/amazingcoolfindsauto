name: Daily Product Pipeline

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch: # Allow manual trigger
  push:
    branches:
      - main
    paths:
      - 'enhanced_pipeline.py'
      - 'core/**'
      - 'tools/**'
      - '.github/workflows/daily_pipeline.yml'

# Prevent concurrent runs
concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # Prevent runaway jobs
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright & Dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Cache FFmpeg
        uses: actions/cache@v4
        id: ffmpeg-cache
        with:
          path: /usr/bin/ffmpeg
          key: ffmpeg-ubuntu-22.04

      - name: Install FFmpeg
        if: steps.ffmpeg-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Run Enhanced Pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          UPLOADPOST_API_KEY: ${{ secrets.UPLOADPOST_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
          CF_PROJECT_NAME: ${{ secrets.CF_PROJECT_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          YT_TOKEN_BASE64: ${{ secrets.YT_TOKEN_BASE64 }}
          YT_CLIENT_SECRET_BASE64: ${{ secrets.YT_CLIENT_SECRET_BASE64 }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          INSTAGRAM_ACCOUNT_ID: ${{ secrets.INSTAGRAM_ACCOUNT_ID }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_TOKEN_BASE64: ${{ secrets.TIKTOK_TOKEN_BASE64 }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python enhanced_pipeline.py --run

      - name: Commit Updated Data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-update products.json [skip ci]"
          file_pattern: 'data/*.json amazing/data/*.json'
          skip_dirty_check: true
