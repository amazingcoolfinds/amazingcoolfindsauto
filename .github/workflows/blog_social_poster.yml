name: Blog Social Poster

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of articles to post'
        required: false
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'

jobs:
  post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Post blog articles to social media
        env:
          UPLOADPOST_API_KEY: ${{ secrets.UPLOADPOST_API_KEY }}
        run: python tools/blog_social_poster.py
