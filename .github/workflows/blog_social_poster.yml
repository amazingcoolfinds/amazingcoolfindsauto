name: Blog Social Poster

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of articles to post'
        required: false
        default: '3'
        type: choice
        options:
          - '1'
          - '3'
          - '5'
  schedule:
    - cron: '0 8,20 * * *' # 8 AM and 8 PM daily

concurrency:
  group: blog-poster
  cancel-in-progress: true

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Post blog articles to social media
        run: python tools/blog_social_poster.py
