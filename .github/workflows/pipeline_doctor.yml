name: Pipeline Maintenance Agent

on:
  workflow_run:
    workflows: ["Daily Product Pipeline"]
    types: [completed]  # Triggers after EVERY run (success AND failure)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Agent mode: full | diagnose | report | improve'
        required: false
        default: 'full'
      dry_run:
        description: 'Dry run (no commits, no notifications)'
        required: false
        default: 'false'

permissions:
  contents: write   # Needed to commit auto-fixes
  issues: write     # Needed to create report issues

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Agent Dependencies
        run: |
          pip install --no-cache-dir \
            requests \
            python-dotenv \
            google-generativeai \
            google-genai \
            groq \
            pyyaml

      - name: Determine Run Context
        id: context
        run: |
          # For workflow_run triggers, pass the triggering run's data
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "RUN_ID=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
            echo "CONCLUSION=${{ github.event.workflow_run.conclusion }}" >> $GITHUB_OUTPUT
            echo "MODE=full" >> $GITHUB_OUTPUT
          else
            # Manual dispatch — use most recent run
            echo "RUN_ID=" >> $GITHUB_OUTPUT
            echo "CONCLUSION=" >> $GITHUB_OUTPUT
            echo "MODE=${{ github.event.inputs.mode || 'full' }}" >> $GITHUB_OUTPUT
          fi

      - name: Determine Daily Run Number
        id: run_number
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Count how many pipeline runs happened today
          TODAY=$(date -u +%Y-%m-%d)
          COUNT=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=20" \
            | python3 -c "
          import sys, json
          from datetime import datetime, timezone
          runs = json.load(sys.stdin).get('workflow_runs', [])
          today = '$(date -u +%Y-%m-%d)'
          daily = [r for r in runs if r.get('name') == 'Daily Product Pipeline' and r.get('created_at', '')[:10] == today]
          print(len(daily))
          ")
          echo "RUN_NUMBER=$COUNT" >> $GITHUB_OUTPUT
          echo "🗓️ Run #$COUNT for today detected"

      - name: Run Maintenance Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_SECRET: ${{ secrets.REDDIT_SECRET }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          REDDIT_SUBREDDIT: ${{ secrets.REDDIT_SUBREDDIT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          
          python tools/pipeline_doctor.py \
            --mode ${{ steps.context.outputs.MODE }} \
            ${{ steps.context.outputs.RUN_ID && format('--run-id {0}', steps.context.outputs.RUN_ID) || '' }} \
            ${{ steps.context.outputs.CONCLUSION && format('--conclusion {0}', steps.context.outputs.CONCLUSION) || '' }} \
            --run-number ${{ steps.run_number.outputs.RUN_NUMBER }} \
            $DRY_FLAG

      - name: Commit Auto-Fixes (if any)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Maintenance Agent: auto-fixes applied [skip ci]"
          commit_user_name: "Pipeline Maintenance Agent"
          commit_user_email: "agent@amazingcoolfinds.bot"
          file_pattern: |
            requirements.txt
            enhanced_pipeline.py
            core/gemini_generators.py
            core/advanced_scraper.py
            data/pipeline_health.json
