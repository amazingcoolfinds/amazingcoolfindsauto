name: Pipeline Maintenance Agent

on:
  workflow_run:
    workflows: ["Daily Product Pipeline"]
    types: [completed]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Agent mode: full | diagnose | report | improve'
        required: false
        default: 'full'
      dry_run:
        description: 'Dry run (no commits, no notifications)'
        required: false
        default: 'false'

# Allow concurrent runs - agent writes to repo, must finish first
concurrency:
  group: maintenance-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Agent Dependencies
        run: pip install requests python-dotenv google-generativeai google-genai groq pyyaml

      - name: Determine Run Context
        id: context
        run: |
          if [ "${{ github.event_name }}" == "workflow_run" ]; then
            echo "RUN_ID=${{ github.event.workflow_run.id }}" >> $GITHUB_OUTPUT
            echo "CONCLUSION=${{ github.event.workflow_run.conclusion }}" >> $GITHUB_OUTPUT
            echo "MODE=full" >> $GITHUB_OUTPUT
          else
            echo "RUN_ID=" >> $GITHUB_OUTPUT
            echo "CONCLUSION=" >> $GITHUB_OUTPUT
            echo "MODE=${{ github.event.inputs.mode || 'full' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run Maintenance Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          WEBSITE_URL: ${{ secrets.WEBSITE_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          DRY_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_FLAG="--dry-run"
          fi
          
          RUN_ID_FLAG=""
          if [ -n "${{ steps.context.outputs.RUN_ID }}" ]; then
            RUN_ID_FLAG="--run-id ${{ steps.context.outputs.RUN_ID }}"
          fi
          
          CONCLUSION_FLAG=""
          if [ -n "${{ steps.context.outputs.CONCLUSION }}" ]; then
            CONCLUSION_FLAG="--conclusion ${{ steps.context.outputs.CONCLUSION }}"
          fi
          
          python tools/pipeline_doctor.py \
            --mode ${{ steps.context.outputs.MODE }} \
            $RUN_ID_FLAG \
            $CONCLUSION_FLAG \
            --run-number ${{ github.run_number }} \
            $DRY_FLAG

      - name: Commit Auto-Fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Maintenance Agent: auto-fixes applied [skip ci]"
          commit_user_name: "Pipeline Maintenance Agent"
          commit_user_email: "agent@amazingcoolfinds.bot"
          file_pattern: |
            requirements.txt
            enhanced_pipeline.py
            core/gemini_generators.py
            core/advanced_scraper.py
            data/pipeline_health.json
