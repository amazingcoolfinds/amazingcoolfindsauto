name: Deploy Website

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'amazing/**'
      - '.github/workflows/deploy-website.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install Wrangler
        run: npm install -g wrangler
        
      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy amazing --project-name amazing-cool-finds --commit-dirty=true
